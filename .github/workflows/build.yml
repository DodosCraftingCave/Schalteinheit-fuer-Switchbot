name: Build App + Installer

on:
  push:
    branches: [ main ]
    paths:
      - 'tool/switchbot_config_v*.py'
      - 'tool/install.py'
      - 'tool/uninstall.py'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}   # erlaubt manuellen Start über den "Run workflow"-Button auf GitHub

jobs:
  # ── 1. Die eigentliche App bauen (Windows) ───────────────────────
  build-app-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller requests

      - name: Neueste Tool-Quelldatei finden
        id: findver
        shell: bash
        run: |
          LATEST=$(ls tool/switchbot_config_v*.py | sort -V | tail -n1)
          echo "Gefunden: $LATEST"
          echo "file=$LATEST" >> "$GITHUB_OUTPUT"

      - name: App bauen (SwitchBot-Konfigurator.exe)
        shell: bash
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "SwitchBot-Konfigurator" "$(basename ${{ steps.findver.outputs.file }})"

      - name: In Repo committen
        run: |
          copy tool\dist\SwitchBot-Konfigurator.exe tool\SwitchBot-Konfigurator.exe
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tool/SwitchBot-Konfigurator.exe
          git diff --staged --quiet || git commit -m "Build: App Windows v${{ github.run_number }}"
          git pull --rebase
          git push

  # ── 2. Die eigentliche App bauen (Linux) ──────────────────────────
  build-app-linux:
    runs-on: ubuntu-latest
    needs: build-app-windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk
          pip install pyinstaller requests

      - name: Neueste Tool-Quelldatei finden
        id: findver
        run: |
          LATEST=$(ls tool/switchbot_config_v*.py | sort -V | tail -n1)
          echo "Gefunden: $LATEST"
          echo "file=$LATEST" >> "$GITHUB_OUTPUT"

      - name: App bauen (SwitchBot-Konfigurator)
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "SwitchBot-Konfigurator" "$(basename ${{ steps.findver.outputs.file }})"

      - name: In Repo committen
        run: |
          cp tool/dist/SwitchBot-Konfigurator tool/SwitchBot-Konfigurator
          chmod +x tool/SwitchBot-Konfigurator
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tool/SwitchBot-Konfigurator
          git diff --staged --quiet || git commit -m "Build: App Linux v${{ github.run_number }}"
          git pull --rebase
          git push

  # ── 3. Installer bauen (Windows) — lädt nur die fertige App ──────
  build-installer-windows:
    runs-on: windows-latest
    needs: build-app-linux
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller

      - name: install_windows.exe bauen
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "install_windows" install.py

      - name: uninstall_windows.exe bauen
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "uninstall_windows" uninstall.py

      - name: In Repo committen
        run: |
          copy tool\dist\install_windows.exe tool\install_windows.exe
          copy tool\dist\uninstall_windows.exe tool\uninstall_windows.exe
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tool/install_windows.exe tool/uninstall_windows.exe
          git diff --staged --quiet || git commit -m "Build: Windows Installer v${{ github.run_number }}"
          git pull --rebase
          git push

  # ── 4. Installer bauen (Linux) — lädt nur die fertige App ────────
  build-installer-linux:
    runs-on: ubuntu-latest
    needs: build-installer-windows
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Abhängigkeiten installieren
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-tk
          pip install pyinstaller

      - name: install_linux bauen
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "install_linux" install.py

      - name: uninstall_linux bauen
        run: |
          cd tool
          pyinstaller --onefile --windowed --name "uninstall_linux" uninstall.py

      - name: In Repo committen
        run: |
          cp tool/dist/install_linux tool/install_linux
          cp tool/dist/uninstall_linux tool/uninstall_linux
          chmod +x tool/install_linux tool/uninstall_linux
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tool/install_linux tool/uninstall_linux
          git diff --staged --quiet || git commit -m "Build: Linux Installer v${{ github.run_number }}"
          git pull --rebase
          git push
